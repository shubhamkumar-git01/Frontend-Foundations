<!-- 
  Topic: Basic HTML Structure 
  Notes:
  - DOCTYPE html ensures the browser uses the latest HTML5 standard.
  - The <html> tag is the root element. lang="en" is vital for screen readers.
  - <head> contains metadata (not visible to users).
  - <body> contains the visible content.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Basics</title>
</head>
<body>
    <h1>Welcome to Web Development</h1>
    <p>This is my first paragraph. Learning how the web is structured!</p>
</body>
</html>
