<!-- 
  Topic: Text Formatting 
  Notes:
  - <strong> and <em> carry semantic weight (importance/emphasis) for screen readers.
  - <b> and <i> are just for visual styling (bold/italic) and are mostly outdated.
-->
<!DOCTYPE html>
<html>
<body>
    <p>This is <strong>important</strong> text.</p>
    <p>This is <em>emphasized</em> text.</p>
    <p>H<sub>2</sub>O is water (subscript). X<sup>2</sup> is math (superscript).</p>
    <pre>
        Preformatted text keeps 
        exact spacing   and line breaks.
    </pre>
</body>
</html>
