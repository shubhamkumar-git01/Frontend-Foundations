<!-- 
  Topic: Lists and Tables 
  Notes:
  - Always use scope="col" or scope="row" for <th> to help screen readers!
-->
<!DOCTYPE html>
<html>
<body>
    <h2>My Tech Stack</h2>
    <ul>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ul>

    <h2>Data Table</h2>
    <table border="1">
        <thead>
            <tr>
                <th scope="col">Tech</th>
                <th scope="col">Proficiency</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>HTML</td>
                <td>Advanced</td>
            </tr>
            <tr>
                <td>CSS</td>
                <td>Intermediate</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
