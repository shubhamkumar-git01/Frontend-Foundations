<!-- 
  Topic: Links and Iframes 
  Notes:
  - target="_blank" opens in a new tab. 
  - Always use rel="noopener noreferrer" for security when opening new tabs.
  - iframes embed another document inside the current HTML document.
-->
<!DOCTYPE html>
<html lang="en">
<body>
    <h2>Advanced Links</h2>
    <a href="https://google.com" target="_blank" rel="noopener noreferrer">Secure Link to Google</a>
    <br><br>
    
    <h2>Iframe Embedding</h2>
    <iframe src="https://example.com" width="400" height="300" title="Example Website"></iframe>
</body>
</html>
