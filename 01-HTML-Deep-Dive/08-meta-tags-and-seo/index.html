<!-- 
  Topic: Meta Tags and SEO 
  Notes:
  - Meta tags provide metadata about the HTML document.
  - Crucial for Search Engine Optimization (SEO) and sharing on social media (Open Graph).
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="This is a practice page for understanding SEO and Meta tags.">
    <meta name="keywords" content="HTML, CSS, JavaScript, SEO">
    <meta name="author" content="Shubham">
    
    <!-- Open Graph for Social Media previews -->
    <meta property="og:title" content="My Learning Journey">
    <meta property="og:description" content="Learning web dev from scratch.">
    
    <title>SEO Optimized Page</title>
</head>
<body>
    <h1>Inspect the head element to see the meta tags!</h1>
</body>
</html>
