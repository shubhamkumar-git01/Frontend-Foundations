<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Complex HTML5 Form</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; font-weight: bold; margin-bottom: 0.5rem; }
        input, select, textarea { width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; }
        input:invalid { border-color: red; }
        input:valid { border-color: green; }
        button { padding: 0.75rem 1.5rem; background: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <h2>Event Registration (No JS Validation)</h2>
    <!-- Note: Using 'novalidate' on form turns off browser validation, but we want it ON here to practice HTML5 native validation -->
    <form action="/submit" method="POST">
        
        <div class="form-group">
            <!-- BEST PRACTICE: explicitly link label 'for' to input 'id' -->
            <label for="fullName">Full Name <span aria-hidden="true">*</span></label>
            <input type="text" id="fullName" name="fullName" required minlength="3" placeholder="John Doe">
        </div>

        <div class="form-group">
            <label for="emailAddr">Email Address</label>
            <input type="email" id="emailAddr" name="emailAddr" required placeholder="you@example.com">
        </div>

        <div class="form-group">
            <label for="age">Age (Must be 18+)</label>
            <input type="number" id="age" name="age" min="18" max="100" required>
        </div>

        <div class="form-group">
            <label for="password">Create Password</label>
            <!-- Pattern ensures at least one number and one uppercase letter -->
            <input type="password" id="password" name="password" required pattern="(?=.*\d)(?=.*[A-Z]).{8,}" title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters">
        </div>

        <button type="submit">Register Now</button>
    </form>

</body>
</html>
