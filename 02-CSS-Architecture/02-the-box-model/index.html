<!DOCTYPE html>
<html>
<head>
    <style>
        /* VERY IMPORTANT: border-box includes padding and border in the element's total width */
        .box {
            box-sizing: border-box;
            width: 300px;
            padding: 50px;
            border: 10px solid black;
            margin: 20px;
            background-color: lightgreen;
        }
    </style>
</head>
<body>
    <div class="box">Content Box</div>
</body>
</html>
