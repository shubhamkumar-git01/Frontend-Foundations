<!DOCTYPE html>
<html>
<head>
    <style>
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .box { background: purple; color: white; padding: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="grid">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
    </div>
</body>
</html>
