<!DOCTYPE html>
<html>
<head>
    <style>
        .btn { padding: 10px 20px; background: blue; color: white; transition: transform 0.3s ease; }
        .btn:hover { transform: scale(1.1); }
        
        .spin { 
            width: 50px; height: 50px; background: red; margin-top: 20px;
            animation: spinAnim 2s infinite linear;
        }
        @keyframes spinAnim {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <button class="btn">Hover Me</button>
    <div class="spin"></div>
</body>
</html>
