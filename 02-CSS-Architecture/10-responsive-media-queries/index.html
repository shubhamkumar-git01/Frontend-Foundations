<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: lightblue; }
        
        /* Mobile First: if screen is larger than 768px, background becomes lightgreen */
        @media (min-width: 768px) {
            body { background: lightgreen; }
        }
    </style>
</head>
<body>
    <h1>Resize the browser window!</h1>
</body>
</html>
