<!DOCTYPE html>
<html>
<head>
    <style>
        /* Pseudo-class (state) */
        a:hover { color: red; }
        li:nth-child(even) { background: #eee; }
        
        /* Pseudo-element (inserts content) */
        h2::before {
            content: "🔥 ";
        }
        h2::after {
            content: " 🔥";
        }
    </style>
</head>
<body>
    <a href="#">Hover me</a>
    <ul>
        <li>Item 1</li>
        <li>Item 2 (Even)</li>
        <li>Item 3</li>
    </ul>
    <h2>Hot Topic</h2>
</body>
</html>
