<!-- 
  Topic: Resets and Normalization
  Notes: Browsers have default margins/paddings. We must reset them.
-->
<!DOCTYPE html>
<html>
<head>
    <style>
        /* A standard modern CSS Reset snippet */
        *, *::before, *::after {
            box-sizing: border-box;
        }
        * {
            margin: 0;
        }
        body {
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }
        img, picture, video, canvas, svg {
            display: block;
            max-width: 100%;
        }
        p { padding: 20px; background: lightyellow; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <p>This paragraph has zero default browser margins because of our reset!</p>
</body>
</html>
