<!DOCTYPE html>
<html>
<head>
    <style>
        .image-container { display: flex; gap: 20px; }
        img { width: 150px; height: 150px; object-fit: cover; }
        
        .blur { filter: blur(5px); }
        .grayscale { filter: grayscale(100%); }
        .sepia { filter: sepia(80%); }
    </style>
</head>
<body>
    <div class="image-container">
        <img src="https://via.placeholder.com/150" class="blur" alt="Blurred">
        <img src="https://via.placeholder.com/150" class="grayscale" alt="Grayscale">
        <img src="https://via.placeholder.com/150" class="sepia" alt="Sepia">
    </div>
</body>
</html>
